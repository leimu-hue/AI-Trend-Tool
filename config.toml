[server]
host = "0.0.0.0"
port = 3000

[database]
path = "./docs/data/hotspot.db"

[auth]
# Initial token (only auto-created when api_tokens table is empty)
initial_token = "optional-initial-token"

[parser]
max_concurrent_fetches = 10
default_user_agent = "HotspotMonitor/1.0"
default_timeout_seconds = 30
interval_seconds = 30

[filter]
batch_size = 1000
interval_seconds = 300
history_hours = 24
min_history_hours = 6

[pusher]
interval_seconds = 10
max_retries = 3
retry_base_seconds = 60
retry_max_seconds = 3600
stale_timeout_minutes = 10

[logging]
dir = "./logs"
level = "info"
max_files = 30
max_days = 7
max_total_size_mb = 500
console_output = true
